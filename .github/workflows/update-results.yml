name: Update World Cup results

on:
  # Run automatically twice a day (08:00 and 20:00 UTC).
  # Cron is in UTC. Adjust if you want different times.
  schedule:
    - cron: "0 8,20 * * *"
  # Also allow manual trigger from the Actions tab.
  workflow_dispatch:

# Allow the workflow to commit back to the repo.
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fetch script
        run: python fetch_results.py

      - name: Commit updated results.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          # Only commit if something actually changed.
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Update results $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
